x-common: &common
  image: network:${SERVICE_VERSION_ABSOLUTE}
  init: true
  environment:
    - TZ=Australia/Perth
    - BROKER_HOST
    - BROKER_PORT
    - DATABASE_HOST
    - DATABASE_PORT
    - DATABASE_NAME
    - DATABASE_TOKEN
  volumes:
    - ${SERVICE_DATA_DIR}:/asystem/mnt
  devices:
    - /dev/ttyUSBTempProbe:/dev/ttyUSB0:rw
  logging:
    driver: "json-file"
    options:
      max-file: "5"
      max-size: "100m"
services:
  network:
    container_name: network
    <<: *common
    restart: ${SERVICE_RESTART}
    healthcheck:
      test: /asystem/etc/checkhealthy.sh
      interval: 2m
      timeout: 30s
      retries: 3
      start_period: 1m
      start_interval: 10s
    deploy:
      resources:
        limits:
          memory: 256M
  network_bootstrap:
    container_name: network_bootstrap
    <<: *common
    restart: 'no'
    entrypoint: bash
    command: /asystem/etc/bootstrap.sh
    depends_on:
      - network
