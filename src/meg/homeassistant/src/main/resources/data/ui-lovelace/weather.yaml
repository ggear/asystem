      name: Roof
    - entity: sensor.compensation_sensor_kitchen_temperature
      name: Kitchen
    - entity: sensor.compensation_sensor_office_lounge_temperature
      name: Lounge
    - entity: sensor.compensation_sensor_office_basement_temperature
      name: Basement
