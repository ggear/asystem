################################################################################
- type: custom:clock-weather-card
  entity: weather.bom_darlington
  temperature_sensor: sensor.compensation_sensor_roof_temperature
  today_description_sensor: sensor.bom_darlington_short_text_0
  forecast_rows: 7
  forecast_type: temp_daily
  show_forecast: true
  hide_clock: true
  hide_date: true
  show_decimal: true
  locale: en-AU
  time_format: 24
  weather_icon_type: fill
- type: custom:clock-weather-card
  entity: weather.bom_darlington
  forecast_rows: 25
  forecast_type: temp_hourly
  show_forecast: true
  show_humidity: false
  hide_current_hourly_forecast: true
  hide_today_section: true
  hide_clock: true
  hide_date: true
  show_decimal: true
  locale: en-AU
  time_format: 24
  weather_icon_type: fill
################################################################################
- type: custom:layout-break
################################################################################
- type: custom:clock-weather-card
  entity: weather.bom_darlington
  rain_sensor: sensor.roof_daily_rain
  rain_rate_sensor: sensor.roof_rain_rate
  rain_sensor_prefix: sensor.bom_darlington_rain
  forecast_rows: 7
  forecast_type: rain_daily
  show_forecast: true
  hide_clock: true
  hide_date: true
  show_decimal: true
  locale: en-AU
  time_format: 24
  weather_icon_type: fill
  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none
- type: custom:bom-radar-card
  zoom_level: 8
  layer: rain_rate
  map_height: 550
  radar_opacity: 0.7
  frame_count: 9
  frame_delay: 750
  restart_delay: 4000
  show_marker: true
  show_zoom: true
  show_playback: true
  dark_basemap: false
################################################################################
- type: custom:layout-break
################################################################################
- type: custom:clock-weather-card
  entity: weather.bom_darlington
  wind_sensor: sensor.roof_wind_speed
  wind_sensor_prefix: sensor.willy_wind_forecast
  forecast_rows: 7
  forecast_type: wind_daily
  show_forecast: true
  hide_clock: true
  hide_date: true
  show_decimal: true
  locale: en-AU
  time_format: 24
  weather_icon_type: fill
  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none
- type: custom:windrose-card
  windspeed_bar_location: right
  input_speed_unit: kph
  data_period:
    period_back: -24h
  wind_direction_entity:
    entity: sensor.roof_wind_direction
  windspeed_entities:
    - entity: sensor.roof_wind_speed
      name: Speed
      output_speed_unit: kph
      windspeed_bar_full: false
      speed_range_beaufort: false
      speed_ranges:
        - from_value: 0
          color: '#a5d6a7'
        - from_value: 5
          color: '#66bb6a'
        - from_value: 10
          color: '#43a047'
        - from_value: 15
          color: '#2e7d32'
        - from_value: 20
          color: '#1b5e20'
  current_direction:
    show_arrow: true
  direction_labels:
    show_intercardinal_directions: true
    show_secondary_intercardinal_directions: true
  rose_config:
    show_circle_legend: false
  matching_strategy:
    log_measurement_counts: false
################################################################################
- type: custom:layout-break
################################################################################
- type: custom:clock-weather-card
  entity: weather.bom_darlington
  bushfire_sensor_prefix: sensor.bom_darlington_fire_danger
  bushfire_alerts_sensor: sensor.dfes_incidents_metro_south_east_any
  forecast_rows: 4
  forecast_type: bushfire_daily
  show_forecast: true
  hide_clock: true
  hide_date: true
  show_decimal: true
  locale: en-AU
  time_format: 24
  weather_icon_type: fill
  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none
################################################################################
- type: custom:layout-break
################################################################################
- type: custom:clock-weather-card
  entity: weather.bom_darlington
  uv_sensor_prefix: sensor.bom_darlington_uv
  forecast_rows: 4
  forecast_type: uv_daily
  show_forecast: true
  hide_clock: true
  hide_date: true
  show_decimal: true
  locale: en-AU
  time_format: 24
  weather_icon_type: fill
  tap_action:
    action: none
  hold_action:
    action: none
  double_tap_action:
    action: none

