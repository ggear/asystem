- type: custom:mini-graph-card
  name: Temperature
  icon: mdi:thermometer
  font_size_header: 19
  aggregate_func: max
  hours_to_show: 48
  points_per_hour: 6
  line_width: 2
  tap_action: none
  show_state: true
  show_indicator: true
  show:
    extrema: true
    fill: false
  entities:
