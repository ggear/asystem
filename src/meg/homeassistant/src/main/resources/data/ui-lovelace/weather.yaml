################################################################################
- type: custom:clock-weather-card
  entity: weather.tomorrow_io_home_daily
  temperature_sensor: sensor.compensation_sensor_roof_temperature
  forecast_rows: 7
  forecast_type: daily
  show_forecast: true
  hide_clock: true
  hide_date: true
  show_decimal: true
  locale: en-AU
  time_format: 24
  weather_icon_type: fill
- type: custom:clock-weather-card
  entity: weather.tomorrow_io_home_daily
  forecast_rows: 37
  hourly_forecast: true
  show_forecast: true
  show_humidity: false
  hide_today_section: true
  hide_clock: true
  hide_date: true
  show_decimal: true
  locale: en-AU
  time_format: 24
  weather_icon_type: fill
  tap_action:
    action: none
################################################################################
- type: custom:layout-break
################################################################################
- type: custom:mini-graph-card
  name: Rain
  icon: mdi:weather-pouring
  font_size_header: 19
  aggregate_func: max
  hours_to_show: 48
  points_per_hour: 6
  line_width: 2
  tap_action: none
  show_state: true
  show_indicator: true
  show:
    extrema: true
    fill: false
  entities:
    - entity: sensor.roof_rain_rate
      name: Rate
